[platformio]
default_envs = tiny, xlarge, no_emoji
extra_configs = platformio.local.ini

[crosspoint]
version = 1.2.0
crossink_version = 1.2.6

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -std=gnu++2a
# Enable UTF-8 long file names in SdFat
  -DUSE_UTF8_LONG_NAMES=1
# Increase PNG scanline buffer to support up to 2048px wide images
# Default is (320*4+1)*2=2562, we need more for larger images
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -Wno-bidi-chars
  -Wl,--wrap=panic_print_backtrace,--wrap=panic_abort
  -fno-exceptions

build_unflags =
  -std=gnu++11
  -fexceptions

; Board configuration
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

extra_scripts =
  pre:scripts/build_html.py
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/patch_jpegdec.py
  post:scripts/rename_firmware.py

; Libraries
lib_deps =
  BatteryMonitor=symlink://open-x4-sdk/libs/hardware/BatteryMonitor
  InputManager=symlink://open-x4-sdk/libs/hardware/InputManager
  EInkDisplay=symlink://open-x4-sdk/libs/display/EInkDisplay
  SDCardManager=symlink://open-x4-sdk/libs/hardware/SDCardManager
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  bitbank2/PNGdec @ ^1.0.0
  https://github.com/bitbank2/JPEGDEC.git#86282979224c8a32fd51e091ed5a35b0c699a52b
  links2004/WebSockets @ 2.7.3

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION is set by scripts/git_branch.py (includes current branch)
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2 ; Set log level to debug for development builds

[env:gh_release]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release builds
  -DOMIT_XLARGE_FONT

[env:gh_release_rc]
extends = base
build_flags =
  ${base.build_flags}
  ; CROSSPOINT_VERSION and CROSSINK_VERSION injected by scripts/git_branch.py
  ; (uses $CROSSPOINT_RC_HASH env var in CI, or git short hash locally)
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1 ; Set log level to info for release candidate builds
  -DOMIT_XLARGE_FONT

[env:slim]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}-slim\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-slim\"
  ; serial output is disabled in slim builds to save space
  -UENABLE_SERIAL_LOG
  -DOMIT_EMOJI_FONTS

; Same as gh_release, explicitly named here for convenience.
; Omits Extra Large (18px) but includes Tiny (10px) font size and emoji support.
[env:tiny]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-tiny\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"tiny\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DOMIT_XLARGE_FONT

; Omits smaller font sizes (10px and 12px) to be able to support emojis
[env:xlarge]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-xlarge\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"xlarge\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DOMIT_TINY_FONT
  -DOMIT_SMALL_FONT

; Includes all font sizes but without Emoji support (smallest build size with all font sizes)
[env:no_emoji]
extends = base
build_flags =
  ${base.build_flags}
  -DCROSSPOINT_VERSION=\"${crosspoint.version}\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}-no_emoji\"
  -DCROSSPOINT_FIRMWARE_VARIANT=\"no_emoji\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=1
  -DOMIT_EMOJI_FONTS

[env:simulator]
platform = native
build_flags =
  -std=gnu++2a
  -arch arm64
  -I/opt/homebrew/include
  -L/opt/homebrew/lib
  -lSDL2
  -DSIMULATOR
  -Wno-c++11-narrowing
  -Wno-bidi-chars
  -DCROSSPOINT_VERSION=\"sim\"
  -DCROSSINK_VERSION=\"${crosspoint.crossink_version}\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DMINIZ_NO_ZLIB_COMPATIBLE_NAMES=1
  -DXML_GE=0
  -DXML_CONTEXT_BYTES=1024
  -DUSE_UTF8_LONG_NAMES=1
  -DPNG_MAX_BUFFERED_PIXELS=16416
  -DDISABLE_FS_H_WARNING=1
  -DDESTRUCTOR_CLOSES_FILE=1
  ;-DOMIT_EMOJI_FONTS ; uncomment to omit emoji/symbols glyphs from reading fonts
  ;-DOMIT_TINY_FONT ; uncomment to omit tiny (10px) font size
  ;-DOMIT_SMALL_FONT ; uncomment to omit small (12px) font size
lib_ignore = hal, PNGdec, JPEGDEC
extra_scripts =
  pre:scripts/gen_i18n.py
  pre:scripts/git_branch.py
  pre:scripts/build_html.py
  scripts/run_simulator.py
lib_deps =
  simulator=https://github.com/uxjulia/crosspoint-simulator
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ ^0.0.1
  links2004/WebSockets @ 2.7.3
